# PEN-STACK v3.0 - the single LLM switch every service (RAG, PEN-MONITOR, agent) reads.
#
# HYBRID pattern: a strong hosted model for reasoning/agent/Q&A (NVIDIA Nemotron, free, no expiry) with
# automatic fallback to a local, free, private model (Ollama). The LLM is NON-load-bearing: every number
# and citation comes from validated tools, so the model choice never affects scientific reproducibility -
# only orchestration/prose quality. Core scientific compute stays local/VM and uses no LLM at all.
#
# Switching is a one-line change to `provider`. Secrets are read from an env var or a gitignored file;
# keys are NEVER committed.

provider: ollama          # active provider: ollama | nvidia | openai
fallback: nvidia          # used automatically when the active provider is unreachable
# Default is the fast, private, local model (Ollama/Qwen) - reliable for interactive use and demos.
# The hosted NVIDIA Nemotron is kept configured below as the fallback AND as the explicit strong-model
# baseline for the Genome-Writing Bench (WS-E selects it directly). Nemotron has better tool-use but
# higher/variable latency (~0.5-6 s/call, ~30 s cold from the VM), so it is not the interactive default.
temperature: 0.1
embedding: ollama/nomic-embed-text   # local, free embeddings for the RAG (Apache-2.0)

providers:
  nvidia:                 # NVIDIA NIM, OpenAI-compatible. Stronger reasoning + tool-use; free, ~40 RPM.
    style: openai
    api_base: https://integrate.api.nvidia.com/v1
    model: nvidia/nemotron-3-super-120b-a12b
    api_key_env: NVIDIA_API_KEY                 # checked first
    api_key_file: configs/nvidia_api_key.txt    # gitignored fallback (never committed)
    max_tokens: 1024

  ollama:                 # local/VM, free, private; the offline fallback + fast iterative dev/demos.
    style: ollama
    api_base: http://localhost:11434
    model: qwen2.5:7b-instruct                  # Apache-2.0, native tool-calling, ~4.7 GB (fits 16 GB GPU)

  openai:                 # optional, paid, opt-in only
    style: openai
    api_base: https://api.openai.com/v1
    model: gpt-4o-mini
    api_key_env: OPENAI_API_KEY

# NOTE: Qwen2.5 3B and 72B are NOT Apache-2.0 (Qwen Research Licence) - use 7B or 14B for the local model.
