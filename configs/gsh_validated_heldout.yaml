# PEN-STACK v3.1 (WS-A3) - held-out, literature-validated/candidate genomic safe harbours (GSH).
# Used ONLY for the blind safe-harbour site-discovery test, never for tuning. Scaled in v3.1.1 to 51 loci
# (the headline AUROC must always be cited with its bootstrap CI and N, never alone). THREE tiers:
#   * tier: validated         - functionally validated safe harbours (8). PRIMARY metric is this tier.
#   * tier: candidate         - computationally-defined universal-GSH near housekeeping genes (8, Lin 2024);
#                               with validated = the 16 CURATED loci (the secondary 'all curated' metric).
#   * tier: pellenz_candidate - the full Pellenz/Sadelain 2019 35-site set (mostly weak computational
#                               candidates; lifted hg19->hg38). Reported SEPARATELY - it scores near chance
#                               (the model does not over-rank weak candidates) and must NOT contaminate the
#                               headline or acceptance.
# Anchors are either a GENCODE gene (resolved from data/curated/gene_coords.parquet) or a precise hg38
# coordinate span (start/end) from the source paper - coordinate anchors are more precise than gene-body
# anchoring. We score ONE representative bin per locus (the best-writability bin in the anchor span) to keep
# positives independent; the eLife set lists 25 sub-sites across these 11 regions, collapsed here to 11
# independent loci to avoid pseudo-replication. DOIs verified via Europe PMC.

gsh:
  # --- tier 1: functionally validated (classic safe harbours) ---
  - {name: AAVS1,    tier: validated, anchor_gene: PPP1R12C, doi: "10.1101/gr.106773.110"}   # DeKelver 2010
  - {name: CLYBL,    tier: validated, anchor_gene: CLYBL,    doi: "10.1371/journal.pone.0116032"}  # Cerbini 2015
  - {name: CCR5,     tier: validated, anchor_gene: CCR5,     doi: "10.1038/nbt1353"}          # Lombardo 2007
  - {name: hRosa26,  tier: validated, anchor_gene: THUMPD3,  doi: "10.1038/nbt1362"}          # Irion 2007
  - {name: H11,      tier: validated, anchor_gene: EIF4ENIF1, doi: "10.1371/journal.pone.0113481"}  # H11/HIPP11
  # --- tier 1 (cont.): functionally validated in Lin et al. 2024 (eLife 79592), precise hg38 spans ---
  - {name: Pansio-1, tier: validated, anchor_coord: {chrom: chr1,  start: 113339961, end: 113340514}, anchor_gene_note: HIPK1, doi: "10.7554/eLife.79592"}
