name: Publish to PyPI

# Publishes the package to PyPI on a version tag (v*) using PyPI Trusted Publishing (OIDC) - no API token
# is stored in the repo. One-time setup on PyPI: add a "pending publisher" for project `pen-stack` pointing
# at this repository, workflow `publish.yml`, environment `pypi`. A manual run can target TestPyPI.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        type: choice
        options: ["pypi", "testpypi"]
        default: "pypi"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with: { name: dist, path: dist/ }

  publish-pypi:
    needs: build
    if: github.event_name == 'push' || github.event.inputs.target == 'pypi'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
