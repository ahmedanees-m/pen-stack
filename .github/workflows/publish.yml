name: Publish to PyPI

# Builds the package and publishes it to PyPI on a version tag (v*), or on a manual run. Authentication
# uses an API token stored as the repo secret PYPI_API_TOKEN (encrypted). `skip-existing: true` means a
# version already on PyPI is skipped, not treated as a failure - so re-runs and already-published versions
# do not fail the workflow. (To switch to tokenless Trusted Publishing instead, see docs/RELEASING.md.)
#
# NOTE: this token-based, tag-triggered workflow intentionally declares NO `environment:` on its jobs. A
# GitHub environment (e.g. `pypi`) would create a Deployment object whose branch/tag policy can BLOCK a
# tag-triggered publish, and adds no provenance beyond the workflow run + the PyPI page. The leftover `pypi`
# environment from the abandoned Trusted-Publishing setup (and its stale failed deployment) was deleted on
# 2026-06-08; PyPI is the source of truth. Do NOT re-add `environment:` here without a tag-allowing policy.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        type: choice
        options: ["pypi", "testpypi"]
        default: "pypi"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with: { name: dist, path: dist/ }

  publish-pypi:
    needs: build
    if: github.event_name == 'push' || github.event.inputs.target == 'pypi'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  publish-testpypi:
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
