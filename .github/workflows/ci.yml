name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check pen_stack tests
      - name: Test (with coverage)
        run: pytest -q --cov=pen_stack --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Refresh self-hosted coverage badge
        if: matrix.python-version == '3.12' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python tools/make_coverage_badge.py coverage.xml .github/badges/coverage.svg
          if ! git diff --quiet .github/badges/coverage.svg; then
            # author as the single repository owner so automation does not appear as a second contributor
            git config user.name "Anees Ahmed Mahaboob Ali"
            git config user.email "ahmedaneesm@gmail.com"
            git add .github/badges/coverage.svg
            git commit -m "ci: refresh coverage badge [skip ci]"
            git push
          fi
