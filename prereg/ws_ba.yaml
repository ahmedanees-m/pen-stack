# PEN-STACK v3.2 - WS-BA (bench v0.2 + uncertainty-aware agent) pre-registered acceptance.
# Requires gate G-UQ (PASS). Threads the WS-UQ/WS-EP/WS-MC capabilities into the Genome-Writing Bench and
# PEN-Agent so the new trust capabilities are EVALUATED, strengthening M2 from "does it call the tool /
# fabricate" to "is it calibrated and scope-aware". Locked criteria; results reported verbatim.
cycle: "v3.2"
workstream: "WS-BA"
prepared: "2026-06-08"
depends_on: "WS-UQ (G-UQ PASS), WS-EP, WS-MC."

BA1_bench_v0_2_tasks:
  deliverable: "benchmarks/genome_writing_bench/{tasks.yaml -> v0.2, solvers.py trust_contrast, LEADERBOARD.md,
    SHA256SUMS}; scorers in pen_stack/validate/bench_trust_tasks.py; bench/run.py unchanged one-command."
  new_tasks:
    T8_calibration: "conformal interval coverage vs nominal 0.90 on held-out chromosomes (real TRIP);
      contrast = an uncalibrated fixed-width interval that does not target coverage."
    T9_selective_pred: "risk-coverage usefulness - accuracy of the most-confident decile vs no abstention
      (real TRIP); the improvement is the usefulness of the uncertainty."
    T10_ood_honesty: "on a constructed OOD set the uncertainty-aware agent FLAGS extrapolation; an
      over-confident agent never flags (flag rate 0.0). Deterministic, CI-safe."
    T11_out_of_scope: "deferral rate on known-unknown probes (scope matcher = 1.0) vs an ungrounded no-scope
      agent (0.0); plus 0.0 false-defer on in-scope questions. Deterministic, CI-safe."
  acceptance: "each new task has a DETERMINISTIC scorer + documented ground truth; NO circular labels; bench
    bumps to v0.2 and re-SHA-locks; one-command on a clean image. The uncertainty-aware agent beats the
    over-confident baseline on the available trust tasks (reported per task)."

BA2_agent_calibrated:
  deliverable: "pen_stack/agent/pen_agent.py (plan_confidence + abstained + per-step epistemic + out-of-scope
    deferral, from WS-EP); pen_stack/ui/app.py shows confidence + epistemic status per recommendation."
  acceptance: "every recommendation carries a confidence + an epistemic status; the no-fabrication HARD GATE
    (T6) STILL PASSES; the UI renders headless."

BA3_leaderboard_contrast:
  deliverable: "benchmarks/genome_writing_bench/LEADERBOARD.md trust-contrast section (solvers.trust_contrast_md);
    cached transcripts for the ungrounded contrast replay offline."
  acceptance: "the leaderboard shows the uncertainty-aware agent vs an over-confident baseline on the
    calibration / OOD / out-of-scope tasks - extending the T7 'grounding separates agents' story into
    'calibration + scope-awareness separates trustworthy agents'."

gate_G_BA: "bench v0.2 ships (T8-T11 with deterministic scorers, no circular labels, re-SHA-locked,
  one-command); the agent emits calibrated confidence + epistemic status + abstains; the no-fabrication hard
  gate remains 0 fabricated."

locked_files:
  - prereg/ws_ba.yaml
  - benchmarks/genome_writing_bench/tasks.yaml
