# PEN-STACK v5.7 - WS-REDTEAM (adversarial probes against the safety gate). Directional.
cycle: "v5.7"
workstream: "WS-REDTEAM"
prepared: "2026-06-11"

motivation: >
  Test the gate as an adversary would: AI-generated homologs (low identity, hazardous function), hazardous
  parts split across a multiplex plan, "reframed as defensive/research" prompts, and obfuscated annotations.

deliverable: >
  pen_stack/safety/redteam.py (run_red_team) over the frozen red-team set in configs/safety/probes.yaml,
  reporting set size, caught count, and reframing stability.

method: >
  run each adversarial case through safety_gate; assert it is refused/escalated (never `clear`); run
  reframing pairs (hazardous artifact vs the same artifact wrapped in benign justification) and assert the
  decision is identical (refuse) - because framing fields are stripped before screening.

acceptance: >
  the gate refuses/escalates the high-severity red-team cases; reframing does NOT flip refuse -> clear (the
  artifact decides, not the framing); reported WITH the set size.

honesty_invariant: "a finite, known set of evasion families; passing it is necessary, not sufficient; the set is continuously extended."
gate: "G-SAFE - all red-team cases caught; reframing stable; reported with set size."
locked_files: [prereg/ws_redteam.yaml, configs/safety/probes.yaml]
