  trace from the committed cache (replay is the CI default).

acceptance: >
  a documented goal is solved by a run whose every number traces to an oracle/tool; a seed-locked replay
  reproduces the run (identical trace); no-fabrication holds across orchestration.

honesty_invariant: "live calls are cache-first + version-pinned + replayable; the agent never invents a value; novelty bounded by oracle validity + the rules."
gate: "G-ORCH - every number tool-sourced; seed-locked replay reproduces the trace; no fabrication."
