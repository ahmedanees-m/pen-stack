cycle: "v5.8"
workstream: "WS-ORCH"
prepared: "2026-06-11"

motivation: >
  Orchestrate the biomolecular foundation models LIVE to drive grounded generation - the agent picks WHICH
  oracle to call; the NUMBER always comes from the oracle, and a seed-locked replay reproduces the run.

deliverable: >
  pen_stack/agent/orchestrator_live.py: orchestrate(goal) - plan -> generate grounded candidates -> call an
