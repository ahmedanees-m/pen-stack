# PEN-STACK v5.0 - WS-CITE + WS-GEN (cited rationale + scoped generalisation) pre-registered. Directional.
cycle: "v5.0"
workstream: "WS-CITE + WS-GEN"
prepared: "2026-06-09"

WS_CITE_rationale:
  deliverable: "pen_stack/agent/cite.py: cited_rationale() + citations_grounded() (hallucinated-citation guard) + curated_dois()"
  method: "each recommendation carries a short mechanistic 'why'; the citations are DRAWN FROM the curated world-model (writer/vehicle/locus/rule provenance DOIs - the already-verified set), NOT generated by an LLM, so they resolve by construction. Numbers remain tool-sourced (the prose is a presentation layer)."
  acceptance: "every rationale cites a REAL source (DOI in the curated set); the hallucinated-citation guard REJECTS any DOI not in the curated set (a fabricated DOI fails); the no-fabrication audit passes (no generated quantity); citations resolve by construction."

WS_GEN_generalisation:
  deliverable: "cite.generalise(task, payload) - grounded-or-refused"
  method: "a task is answered ONLY if it maps to an existing grounded capability (delivery selection / write-type legality / off-target screen / writer-variant critique); anything else is REFUSED with a scope statement."
  acceptance: "a grounded adjacent task returns a grounded verdict; an UN-grounded task is REFUSED (refused=True) with a scope statement, never faked (Principle 4); no-fabrication holds."

gate: "citations resolve (no hallucinated references - guard asserts); numbers tool-sourced; generalisation grounded-or-refused; no-fabrication intact."
locked_files: [prereg/ws_cite.yaml]
