# PEN-STACK v7.1 - PEN-CHAT (the grounded conversational system). Pre-registered, SHA-locked.
# Consolidates WS-HYBRID (the 4-lane spine, already shipped) + PEN-RAG (grounding the last lane).
cycle: "v7.1"
workstream: "PEN-CHAT"
prepared: "2026-06-24"
base: "PEN-STACK v7.0.0 (+ WS-HYBRID: pen_stack/web/{router,guide,llm}.py, configs/metric_guide.yaml)"
motivation: >
  Make the conversation expert AND honest by grounding the one ungrounded lane (General) with retrieval-and-citation,
  so EVERY surfaced fact is engine-computed or retrieved-and-cited; no claim originates from model weights; the system
  abstains rather than guess; and the property is MEASURED by a routing + groundedness + refusal suite plus a
  head-to-head against ungrounded baselines. This does NOT change any calibrated axis - only the conversation.

invariants:
  - no_fabrication: "every factual sentence maps to an engine output, a curated artifact, or a retrieved-and-cited source"
  - llm_never_originates: "the LLM narrates engine output / retrieved evidence; it never originates a claim or a number"
  - per_lane_provenance: "a general-knowledge fact is never presented as a PEN-STACK result; each lane carries its own label"
  - tools_own_numbers: "any quantity the engine can compute is computed by it and redirected there; RAG/LLM never produce it"
  - answer_then_label: "the General lane ANSWERS general + social questions, clearly labelled 'general - not PEN-STACK-verified' (a labelled general answer is honest); abstention is the rare exception, not the default (amended v7.1.1)"
  - abstain_only_specific: "the system abstains ONLY on a SPECIFIC unsourceable empirical claim (where it would otherwise invent a statistic), not on general or social questions (amended v7.1.1; the prior 'abstain below retrieval threshold' over-corrected and suppressed the whole lane)"
  - llm_swappable: "outputs are invariant to the model choice because the model never carries truth"

# --- the routing label set (frozen) ---
routing_labels: [design, explain, meta, general]
routing_rule: >
  engine-computable or a write request -> design (engine, guard ON); metric meaning -> explain (metric_guide);
  capability/accuracy-about-the-engine -> meta (live facts); general knowledge -> general (grounded by retrieval).
  Ambiguity biases to the grounded lane / a clarifying redirect. Numbers always come from the engine.

# --- the corpus manifest (Tier-1 own artifacts + Tier-2 curated literature) ---
corpus:
  artifact: "data/rag_corpus.parquet"          # SHA-locked at build
  embeddings: "data/rag_corpus_emb.npy"        # committed for replay (corpus side, deterministic)
  embedding_model: "nomic-embed-text"          # pinned local model via Ollama; query embedded at runtime, else lexical fallback
  index_kind: "exact cosine over a committed embedding matrix (corpus is ~hundreds of chunks; FAISS unnecessary at this scale - a numpy matrix is the reproducible equivalent)"
  chunk_fields: [chunk_id, text, source_id, doi, access_grade, type, scope_status]
  tier1_sources:                                # own provenance-tagged artifacts (each chunk DOI/quote-backed where applicable)
    - writer_efficiency_rows                    # 45 DOI+verbatim-quote integration-efficiency rows
    - metric_guide                              # configs/metric_guide.yaml (7 metrics: scale/direction/computed/validation/reference)
    - writer_atlas_family_cards                 # per-family mechanism/capacity/tier/activity + DOIs
    - data_model_cards                          # docs/cards/*.md
    - scope_manifest                            # the known-unknowns / out-of-scope boundary
    - deviations_ledger                         # the honesty ledger summary (public-safe lines)
  tier2_sources:                                # curated primary literature, chunked with its DOI (key findings, not redistributed full text)
    - curated_primary_literature

# --- workstreams (objective . deliverables . acceptance . gate) ---
workstreams:
  P-WS0: {objective: "pre-register", deliverables: [prereg/ws_penchat.yaml, prereg/SHA256_LOCK_ws_penchat.json], gate: locked}
  P-WS1:
    objective: "ground the General lane (retrieve -> cite -> guard)"
    deliverables: ["pen_stack/rag/{corpus,retrieve,ground}.py", "data/rag_corpus.parquet", "data/rag_corpus_emb.npy"]
    acceptance: "citation coverage = 1.0 on the General-lane eval; abstains on out-of-corpus queries; general answers labelled 'literature-cited' (not 'PEN-STACK result') and redirected to the engine wherever computable"
    gate: "P-G1"
  P-WS2:
    objective: "swappable-provider abstraction behind the guard"
    deliverables: ["pen_stack/web/llm_provider.py"]
    acceptance: "the same queries yield the same grounded results (same provenance, same numbers) across >=2 providers; default provider documented"
  P-WS3:
    objective: "memory carries lane + provenance"
    deliverables: ["history-turn extension in web/ (server + client)"]
    acceptance: "a follow-up to a grounded answer never silently downgrades to General; tested on a follow-up set"
  P-WS4:
    objective: "routing benchmark"
    deliverables: ["benchmarks/chat_routing/"]
    acceptance: "per-lane precision/recall + confusion matrix; the SAFETY metric P(result-request -> non-grounded lane) ~ 0; per-lane F1 above floor; misroutes reported"
    gate: "P-G2"
  P-WS5:
    objective: "groundedness benchmark"
    deliverables: ["benchmarks/chat_grounding/"]
    acceptance: "citation coverage = 1.0 across lanes; 0 unsupported claims pass the guard; faithfulness above a pre-set floor; reproducible in CI via committed eval-query embeddings"
    gate: "P-G3"
  P-WS6:
    objective: "refusal/abstention benchmark + head-to-head"
    deliverables: ["benchmarks/chat_safety/", "benchmarks/chat_headtohead/"]
    acceptance: "false-grounding rate ~ 0; out-of-corpus abstention + dual-use refusal + injection-hold fire on their sets; head-to-head vs vanilla-RAG + ungrounded base LLM reported VERBATIM incl. negatives"
    gate: "P-G4"
  P-WS7:
    objective: "web provenance chips + release v7.1.0"
    deliverables: ["web/ provenance + abstention/refusal/citation states", "manifest chat capability", "version 7.1.0", "deposit phase_7.1/"]
    acceptance: "every chat fact carries its lane label + provenance; the chat capability declares its per-lane fabrication stance honestly"

# --- metrics (frozen definitions; the headline + abstention re-scoped in the v7.1.1 amendment) ---
metrics:
  false_grounding_rate: "THE headline. Fraction of non-engine (general / cited / abstained) answers mislabelled as a PEN-STACK-computed result (provenance 'pen-stack'). Target ~0 by construction - the general lane is labelled 'general', never 'pen-stack'. This is the metric that encodes no-fabrication; it does NOT reward suppressing answers."
  citation_coverage: "on the CITED answers, fraction of factual lines mapping to a source. Target 1.0."
  unsupported_claims_through_guard: "count of cited answers lacking sources / leaking an [unverified] number. Target 0."
  helpful_answer_rate: "fraction of general + social questions that are ANSWERED (labelled), not abstained. Target ~1.0 (the regression guard: the lane must remain helpful, like WS-HYBRID)."
  specific_empirical_abstention_rate: "fraction of SPECIFIC unsourceable empirical claims on which the system abstains / redirects to the engine rather than invent a statistic. (Abstention is scoped HERE, not to general questions.)"
  routing_safety_metric: "P(a write/result request is routed to a non-grounded lane). Target ~0."
  per_lane_f1: "routing F1 per lane on the sealed labelled set; floor 0.80."
  retrieval_confidence_threshold: 0.50   # cosine; ABOVE this (+ lexical overlap) a corpus chunk is CITED. Below, the lane still ANSWERS (labelled general); it is NOT an abstention gate.

gates:
  P-G1: "General lane grounded (citation coverage = 1.0; abstains out-of-corpus) before it ships"
  P-G2: "routing safety metric ~ 0 (no result query leaks to a non-grounded lane)"
  P-G3: "0 unsupported claims pass the guard; citation coverage = 1.0"
  P-G4: "false-grounding rate ~ 0; refusal/abstention/injection hold; head-to-head reported (incl. negatives)"
  inherited: "the no-fabrication gate (the chat capability is honest about per-lane fabrication; grounded lanes fabricates=False)"

non_goals:
  - "any fine-tuning (the LLM is infrastructure, not a trained domain model)"
  - "changing any calibrated axis (only the conversation becomes expert + honest)"
  - "a free-form chatbot that answers without grounding"
  - "RAG or the LLM producing a number a tool should compute"

honest_limits: >
  PEN-CHAT makes the conversation expert and honest; it does NOT change the accuracy of any calibrated axis, and it is
  bounded by the corpus (it abstains beyond it). General-knowledge answers, even retrieved, are labelled literature-
  sourced, not PEN-STACK-computed. It is a grounded-systems + evaluation contribution, not a trained model.

locked_files: [prereg/ws_penchat.yaml]
